name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat package.json | grep '"version"' | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Body
        id: generate_release_body
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: v${{ steps.get_version.outputs.version }}
          config-name: release-drafter.yml
          draft: true

  build:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Sync version to tauri.conf.json
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          $tauri = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Synced version to: $version"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
        run: pnpm tauri build

      - name: Upload exe to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $release = gh release view v${{ needs.release.outputs.version }} --json uploadUrl,url -q '.'
          $upload_url = $release | ConvertFrom-Json | Select-Object -ExpandProperty uploadUrl
          gh release upload v${{ needs.release.outputs.version }} src-tauri/target/release/kagamicraftlauncher.exe --clobber
