name: Release

on:
  workflow_dispatch:
    inputs:
      change_notes:
        description: 'Change Notes'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable

      - name: Sync version to tauri.conf.json
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          $tauri = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Synced version to: $version"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Kagami Craft Launcher v__VERSION__'
          releaseBody: ${{ github.event.inputs.change_notes }}
          releaseDraft: false
          prerelease: false
